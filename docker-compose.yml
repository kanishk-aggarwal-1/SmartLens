version: "3.9"

# ── SmartLens full-stack: app + Redis + Prometheus + Grafana ──────────────────
#
# Quick start:
#   cp .env.example .env        # fill in GOOGLE_MAPS_API_KEY, GEMINI_API_KEY
#   docker compose up --build
#
# Services:
#   http://localhost:8000  — SmartLens app  (metrics panel bottom-right)
#   http://localhost:9090  — Prometheus
#   http://localhost:3000  — Grafana  (admin / smartlens)
#
# Metrics persistence:
#   The app writes request/event counters to Redis via HINCRBY so they
#   survive container restarts.  REDIS_URL is injected by this file; you
#   do NOT need to set it in your .env when using Compose.
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── Redis ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ── SmartLens app ──────────────────────────────────────────────────────────
  app:
    build: .
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file: .env                # your local secrets
    environment:
      # Override / extend what's in .env:
      REDIS_URL: redis://redis:6379/0
      CACHE_BACKEND: auto
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 15s
      timeout: 5s
      retries: 3

  # ── Prometheus ─────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.51.2
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
      - "--web.enable-lifecycle"
    depends_on:
      app:
        condition: service_healthy

  # ── Grafana ────────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.4.2
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: smartlens
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus

volumes:
  redis_data:
  prometheus_data:
  grafana_data:
